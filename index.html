<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popialicious - Sistem Tempahan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; }
        .hero-section { background-color: #ff9800; color: white; padding: 20px 0; text-align: center; border-bottom: 5px solid #e65100; transition: 0.3s; }
        .card-custom { box-shadow: 0 5px 20px rgba(0,0,0,0.08); border: none; border-radius: 12px; background-color: white; margin-bottom: 20px; transition: 0.3s; }
        .receipt-box { background-color: #e9ecef; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 14px; transition: 0.3s; }
        

        body.dark-mode { background-color: #121212; color: #ffffff; }
        body.dark-mode .hero-section { background-color: #1a1a1a; border-bottom: 5px solid #ff9800; }
        body.dark-mode .card-custom { background-color: #1e1e1e; color: #ffffff; box-shadow: 0 5px 20px rgba(255,255,255,0.05); }
        body.dark-mode .receipt-box { background-color: #2c2c2c; color: #ffeb3b; }
        body.dark-mode .form-control { background-color: #2c2c2c; color: #ffffff; border-color: #444; }
        body.dark-mode .text-muted { color: #aaaaaa !important; }

        #appSection { display: none; }
    </style>
</head>
<body>


    <header class="hero-section position-relative">
        <div class="container">
            <h1 class="display-6 fw-bold">Sistem Tempahan Popialicious</h1>
            <button class="btn btn-dark btn-sm position-absolute top-50 end-0 translate-middle-y me-3" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>
    </header>

    <div class="container my-5">

        <div id="loginSection" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-custom p-5 text-center">
                    <h3 class="mb-4">Log Masuk Kakitangan</h3>
                    <p class="text-muted small mb-4">Gunakan Username: <b>admin</b> | Password: <b>1234</b></p>
                    
                    <input type="text" id="loginUser" class="form-control mb-3" placeholder="Username">
                    <input type="password" id="loginPass" class="form-control mb-4" placeholder="Password">
                    
                    <button class="btn btn-warning w-100 fw-bold" onclick="verifyLogin()">Log Masuk</button>
                </div>
            </div>
        </div>


        <div id="appSection" class="row">
            <div class="col-md-12 text-end mb-3">
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Log Keluar</button>
            </div>

            <div class="col-md-7">
                <div class="card card-custom p-4">
                    <h4 class="mb-4">Maklumat Pelanggan & Tempahan</h4>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nama Penuh:</label>
                        <input type="text" class="form-control" id="custName" placeholder="Masukkan nama pelanggan">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombor Telefon (WhatsApp):</label>
                        <input type="tel" class="form-control" id="custPhone" placeholder="Contoh: 0174498109">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Alamat Penghantaran:</label>
                        <textarea class="form-control" id="custAddress" rows="2" placeholder="Masukkan alamat lengkap"></textarea>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Kuantiti Popia Carbonara (Pek):</label>
                        <p class="text-muted small mb-1">RM 15.00 / pek (10 Biji)</p>
                        <input type="number" class="form-control form-control-lg" id="quantity" value="1" min="1" onchange="calculateTotal()" onkeyup="calculateTotal()">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <h5 class="mb-0">Jumlah:</h5>
                        <h3 class="mb-0 text-success fw-bold" id="totalPrice">RM 15.00</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card card-custom p-4">
                    <h5 class="mb-3 text-center">Tindakan</h5>
                    <button class="btn btn-warning w-100 fw-bold btn-lg mb-3" onclick="processOrder()">Hantar ke WhatsApp</button>
                    <hr>
                    <h6 class="fw-bold mt-2">Rekod Tempahan Terakhir:</h6>
                    <div id="receiptArea" class="receipt-box mb-2"><i>Tiada rekod dijumpai.</i></div>
                    <button class="btn btn-outline-danger btn-sm w-100" onclick="clearData()">Padam Rekod LocalStorage</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pricePerPack = 15.00;

        // FUNGSI DARK MODE
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

    
        function verifyLogin() {
            let user = document.getElementById('loginUser').value;
            let pass = document.getElementById('loginPass').value;

            if(user === "admin" && pass === "1234") {
                document.getElementById('loginSection').style.display = "none";
                document.getElementById('appSection').style.display = "flex";
                displayLastOrder(); // Load data bila berjaya masuk
            } else {
                alert("Akses Ditolak! Username atau Password salah.");
            }
        }

  
        function logout() {
            document.getElementById('loginSection').style.display = "flex";
            document.getElementById('appSection').style.display = "none";
            document.getElementById('loginUser').value = "";
            document.getElementById('loginPass').value = "";
        }

 
        function calculateTotal() {
            let quantity = parseInt(document.getElementById('quantity').value);
            if (isNaN(quantity) || quantity < 1) quantity = 1;
            let total = quantity * pricePerPack;
            document.getElementById('totalPrice').innerText = "RM " + total.toFixed(2);
            return total.toFixed(2);
        }

        function processOrder() {
            let name = document.getElementById('custName').value;
            let phone = document.getElementById('custPhone').value;
            let address = document.getElementById('custAddress').value;
            let quantity = document.getElementById('quantity').value;

            if(!name || !phone || !address) {
                alert("Sila lengkapkan borang tempahan!");
                return;
            }

            let total = calculateTotal();
            let orderID = "ORD-" + Math.floor(Math.random() * 10000);

            let orderData = { id: orderID, name: name, quantity: quantity, total: total };
            localStorage.setItem("lastOrder_Popialicious", JSON.stringify(orderData));
            displayLastOrder();

            let textMessage = `*TEMPAHAN BARU POPIALICIOUS*%0AID Tempahan: ${orderID}%0ANama: ${name}%0AAlamat: ${address}%0APesanan: ${quantity} pek Frozen Popia Carbonara%0A*Jumlah: RM ${total}*`;
            window.open(`https://wa.me/60174498109?text=${textMessage}`, '_blank');
        }

        function displayLastOrder() {
            let savedData = localStorage.getItem("lastOrder_Popialicious");
            if(savedData) {
                let data = JSON.parse(savedData);
                document.getElementById('receiptArea').innerHTML = `<b>ID:</b> ${data.id} <br><b>Nama:</b> ${data.name} <br><b>Jumlah:</b> RM ${data.total} <br><span class="text-success fw-bold">✓ Tersimpan di Browser</span>`;
            } else {
                document.getElementById('receiptArea').innerHTML = "<i>Tiada rekod dijumpai.</i>";
            }
        }

        function clearData() {
            localStorage.removeItem("lastOrder_Popialicious");
            displayLastOrder();
        }
    </script>
</body>
</html>
